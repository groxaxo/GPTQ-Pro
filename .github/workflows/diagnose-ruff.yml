name: Ruff Diagnostics

on:
  push:
    branches:
      - docs/repository-consistency-20260711
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install Ruff
        run: python -m pip install ruff==0.13.0
      - name: Capture Ruff output
        shell: bash
        run: |
          set +e
          ruff check . --output-format=concise > ruff-check.txt 2>&1
          echo "$?" > ruff-check.exit
          ruff format --check . > ruff-format.txt 2>&1
          echo "$?" > ruff-format.exit
          set -e
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: ruff-diagnostics
          path: |
            ruff-check.txt
            ruff-check.exit
            ruff-format.txt
            ruff-format.exit
          if-no-files-found: error
